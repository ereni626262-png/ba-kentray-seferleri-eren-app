<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Hatası | Veri Kesintisi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #1a1a2e 0%, #16213e 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        /* Arka plan animasyonu için hafif ışıklar */
        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(231, 76, 60, 0.3);
            filter: blur(80px);
            border-radius: 50%;
            z-index: 0;
            animation: pulse 6s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); opacity: 0.5; }
            to { transform: scale(1.5); opacity: 0.8; }
        }

        .error-container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 90%;
        }

        .icon-box {
            font-size: 80px;
            margin-bottom: 20px;
            animation: shake 0.5s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #ff4d4d;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            color: #a0a0c0;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .error-code {
            display: inline-block;
            background: rgba(255, 77, 77, 0.1);
            padding: 5px 15px;
            border-radius: 8px;
            font-family: 'Courier New', Courier, monospace;
            color: #ff4d4d;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .btn {
            background: #ff4d4d;
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-block;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: #ff3333;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 77, 77, 0.3);
        }

        .footer-text {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #666;	
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="error-container">
        <div class="icon-box">⚠️</div>
        <h1>Sistem Hatası</h1>
        <div class="error-code">Hata Kodu: ERR_SYS_404_VOID</div>
        <p>Görünüşe göre sistemimiz kısa bir süreliğine paralel evrene geçiş yaptı. Teknik ekibimiz boyut kapısını kapatmak için üzerinde çalışıyor.</p>
        
        <a href="#" class="btn" onclick="location.reload()">Sistemi Yenile</a>
        
        <div class="footer-text">
            Yöneticiye bildirmek için otomatik rapor oluşturuldu.
        </div>
    </div>

</body>
</html>
